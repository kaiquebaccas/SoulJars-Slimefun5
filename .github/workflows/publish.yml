name: Publish Release
on:
  push:
    tags:
      - "*"
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Builds the shaded jar and creates a GitHub Release for this tag with the jar attached, so it can
      # be consumed via githubImplementation("Slimefun5:SoulJars:<tag>") and downloaded directly.
      - name: Publish GitHub Release
        run: ./gradlew publishGithub -Partifact_version=${{ github.ref_name }} --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
